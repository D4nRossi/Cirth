name: cirth

services:

  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: cirth-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      MODSEC_RULE_ENGINE: "On"
      MODSEC_AUDIT_ENGINE: "RelevantOnly"
      PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
    depends_on:
      - web
      - mcp
    networks:
      - cirth-edge

  web:
    image: ghcr.io/d4nrossi/cirth-web:latest
    build:
      context: ./src
      dockerfile: Cirth.Web/Dockerfile
    container_name: cirth-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: ${POSTGRES_CONN}
      ConnectionStrings__Redis: ${REDIS_CONN}
      Qdrant__Endpoint: http://qdrant:6334
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSsl: "false"
      AzureAi__Endpoint: ${AZURE_AI_ENDPOINT}
      AzureAi__ApiKey: ${AZURE_AI_API_KEY}
      AzureAi__ChatDeployment: gpt-4.1
      AzureAi__ChatMiniDeployment: gpt-4.1-mini
      AzureAi__EmbeddingDeployment: text-embedding-3-small
      EntraId__TenantId: ${ENTRA_TENANT_ID}
      EntraId__ClientId: ${ENTRA_CLIENT_ID}
      EntraId__ClientSecret: ${ENTRA_CLIENT_SECRET}
      Serilog__MinimumLevel: Information
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - cirth-edge
      - cirth-data

  mcp:
    image: ghcr.io/d4nrossi/cirth-mcp:latest
    build:
      context: ./src
      dockerfile: Cirth.Mcp/Dockerfile
    container_name: cirth-mcp
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      ConnectionStrings__Postgres: ${POSTGRES_CONN}
      ConnectionStrings__Redis: ${REDIS_CONN}
      Qdrant__Endpoint: http://qdrant:6334
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      AzureAi__Endpoint: ${AZURE_AI_ENDPOINT}
      AzureAi__ApiKey: ${AZURE_AI_API_KEY}
      Serilog__MinimumLevel: Information
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - cirth-edge
      - cirth-data

  worker:
    image: ghcr.io/d4nrossi/cirth-worker:latest
    build:
      context: ./src
      dockerfile: Cirth.Worker/Dockerfile
    container_name: cirth-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: ${POSTGRES_CONN}
      Qdrant__Endpoint: http://qdrant:6334
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      AzureAi__Endpoint: ${AZURE_AI_ENDPOINT}
      AzureAi__ApiKey: ${AZURE_AI_API_KEY}
      Worker__JobPollingIntervalSeconds: 5
      Worker__MaxConcurrentJobs: 3
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cirth-data

  postgres:
    image: postgres:16-alpine
    container_name: cirth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cirth
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d cirth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cirth-data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cirth-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__ENABLE_TLS: "false"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cirth-data

  redis:
    image: redis:7-alpine
    container_name: cirth-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - cirth-data

  minio:
    image: minio/minio:latest
    container_name: cirth-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cirth-data

  minio-init:
    image: minio/mc:latest
    container_name: cirth-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/cirth-uploads;
      mc mb --ignore-existing local/cirth-exports;
      mc version enable local/cirth-uploads;
      echo 'MinIO buckets ready';
      "
    networks:
      - cirth-data

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  minio-data:

networks:
  cirth-edge:
    driver: bridge
  cirth-data:
    driver: bridge
