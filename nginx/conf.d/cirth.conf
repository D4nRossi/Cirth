upstream cirth_web {
    server web:8080;
    keepalive 32;
}

upstream cirth_mcp {
    server mcp:8081;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name cirth.local;
    return 301 https://$server_name$request_uri;
}

# HTTPS principal - Cirth Web
server {
    listen 443 ssl http2;
    server_name cirth.local;

    ssl_certificate     /etc/nginx/certs/cirth.local.crt;
    ssl_certificate_key /etc/nginx/certs/cirth.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 60M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Blazor Server SignalR
    location /_blazor {
        proxy_pass http://cirth_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_cache off;
    }

    # SignalR custom hubs (notifications, chat)
    location ~ ^/hubs/ {
        proxy_pass http://cirth_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://cirth_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# HTTPS MCP - mcp.cirth.local
server {
    listen 443 ssl http2;
    server_name mcp.cirth.local;

    ssl_certificate     /etc/nginx/certs/cirth.local.crt;
    ssl_certificate_key /etc/nginx/certs/cirth.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://cirth_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
